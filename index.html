<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>数据看板</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Arial, sans-serif;
      background: #f5f6fa;
      color: #1a1a2e;
      min-height: 100vh;
      padding: 20px;
    }

    .section-title {
      font-size: 15px;
      font-weight: 600;
      color: #444;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-title::before {
      content: '';
      display: inline-block;
      width: 4px;
      height: 16px;
      background: #4f6ef7;
      border-radius: 2px;
    }

    .panel {
      background: #fff;
      border-radius: 12px;
      padding: 20px 24px;
      box-shadow: 0 1px 6px rgba(0,0,0,.07);
      margin-bottom: 16px;
    }

    /* ── Overview Cards ── */
    .overview-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px;
    }
    .card {
      background: #f8f9ff;
      border: 1px solid #e8eaf6;
      border-radius: 10px;
      padding: 14px 16px;
      position: relative;
      transition: box-shadow .2s;
    }
    .card:hover { box-shadow: 0 2px 10px rgba(79,110,247,.12); }
    .card-label { font-size: 12px; color: #888; margin-bottom: 6px; }
    .card-value { font-size: 22px; font-weight: 700; line-height: 1.2; }
    .card-unit  { font-size: 12px; color: #aaa; margin-top: 2px; }
    .card-trend { font-size: 11px; margin-top: 6px; padding: 2px 6px; border-radius: 20px; display: inline-block; }
    .trend-up   { background: #e8f5e9; color: #388e3c; }
    .trend-down { background: #fce4ec; color: #c62828; }

    /* color picker row */
    .card-color-row { display: none; gap: 5px; margin-top: 8px; align-items: center; flex-wrap: wrap; }
    .card.editing .card-color-row { display: flex; }
    .card-color-dot {
      width: 16px; height: 16px; border-radius: 50%; cursor: pointer;
      border: 2px solid transparent; transition: border-color .15s; flex-shrink: 0;
    }
    .card-color-dot:hover { border-color: #333; }
    .card-color-dot.active { border-color: #333; }

    /* card edit mode */
    .card.editing .card-value       { display: none; }
    .card.editing .card-edit-input  { display: block; }
    .card-edit-input {
      display: none; width: 100%; font-size: 20px; font-weight: 700;
      border: none; border-bottom: 2px solid #4f6ef7; background: transparent; outline: none; padding: 2px 0;
    }
    .card.editing .card-label-text  { display: none; }
    .card.editing .card-label-input { display: block; }
    .card-label-input {
      display: none; width: 100%; font-size: 12px; color: #888;
      border: none; border-bottom: 1px dashed #ccc; background: transparent; outline: none; padding: 1px 0; margin-bottom: 4px;
    }
    .card.editing .card-unit-text   { display: none; }
    .card.editing .card-unit-input  { display: block; }
    .card-unit-input {
      display: none; width: 100%; font-size: 12px; color: #aaa;
      border: none; border-bottom: 1px dashed #ccc; background: transparent; outline: none; padding: 1px 0;
    }
    .card.editing .card-trend       { display: none; }
    .card.editing .card-trend-input { display: block; }
    .card-trend-input {
      display: none; width: 100%; font-size: 11px;
      border: none; border-bottom: 1px dashed #ccc; background: transparent; outline: none; padding: 1px 0; margin-top: 4px; color: #555;
    }
    .card-add-btn {
      background: #f0f3ff; border: 2px dashed #c5cef7; border-radius: 10px;
      padding: 14px 16px; cursor: pointer; display: flex; align-items: center; justify-content: center;
      color: #7a8fd4; font-size: 24px; transition: background .2s; min-height: 90px;
    }
    .card-add-btn:hover { background: #e4e9ff; }
    .card-remove-btn {
      position: absolute; top: 6px; right: 6px; width: 18px; height: 18px;
      background: #ff5252; color: #fff; border: none; border-radius: 50%;
      font-size: 12px; cursor: pointer; display: none; align-items: center; justify-content: center; line-height: 1;
    }
    .card.editing .card-remove-btn { display: flex; }

    /* ── Buttons ── */
    .btn {
      padding: 6px 16px; border-radius: 6px; font-size: 13px;
      cursor: pointer; border: none; font-weight: 500; transition: opacity .2s;
    }
    .btn:hover { opacity: .85; }
    .btn-primary { background: #4f6ef7; color: #fff; }
    .btn-outline { background: #fff; color: #4f6ef7; border: 1px solid #4f6ef7; }
    .btn-success { background: #43a047; color: #fff; }
    .btn-sm { padding: 4px 12px; font-size: 12px; }

    /* ── Tab Chart ── */
    .tab-header {
      display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;
    }
    .tabs {
      display: flex; gap: 4px; background: #f0f2f8; border-radius: 8px; padding: 4px;
    }
    .tab-btn {
      padding: 6px 16px; border-radius: 6px; font-size: 13px;
      cursor: pointer; border: none; background: transparent; color: #666; font-weight: 500; transition: all .2s;
    }
    .tab-btn.active { background: #fff; color: #4f6ef7; box-shadow: 0 1px 4px rgba(0,0,0,.1); }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .chart-wrap { position: relative; height: 280px; }

    /* axis legend */
    .axis-legend {
      display: flex; gap: 20px; justify-content: center; margin-bottom: 8px; flex-wrap: wrap;
    }
    .axis-legend-item {
      display: flex; align-items: center; gap: 5px; font-size: 12px; color: #666;
    }
    .axis-legend-dot {
      width: 10px; height: 10px; border-radius: 50%;
    }
    .axis-label-left  { font-size: 11px; color: #4f6ef7; margin-bottom: 4px; text-align: left; }
    .axis-label-right { font-size: 11px; color: #ef5350; margin-bottom: 4px; text-align: right; }
    .axis-labels-row  { display: flex; justify-content: space-between; }

    /* ── Edit Modal ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4);
      z-index: 1000; align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #fff; border-radius: 14px; padding: 28px 32px;
      width: 520px; max-width: 95vw; max-height: 90vh; overflow-y: auto;
      box-shadow: 0 8px 40px rgba(0,0,0,.18);
    }
    .modal-title { font-size: 16px; font-weight: 600; margin-bottom: 6px; color: #222; }
    .modal-hint  { font-size: 12px; color: #aaa; margin-bottom: 16px; }
    .modal-series-title {
      font-size: 13px; font-weight: 600; color: #333;
      margin: 14px 0 8px; display: flex; align-items: center; gap: 8px;
    }
    .modal-months-grid {
      display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; margin-bottom: 4px;
    }
    .modal-month-cell { display: flex; flex-direction: column; gap: 3px; }
    .modal-month-cell label { font-size: 11px; color: #aaa; text-align: center; }
    .modal-month-cell input {
      padding: 6px 4px; border: 1px solid #dde1f0; border-radius: 6px;
      font-size: 13px; text-align: center; outline: none; width: 100%;
    }
    .modal-month-cell input:focus { border-color: #4f6ef7; }
    .modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }

    @media (max-width: 480px) {
      body { padding: 12px; }
      .cards-grid { grid-template-columns: repeat(2, 1fr); }
      .modal { padding: 20px 16px; }
      .modal-months-grid { grid-template-columns: repeat(3, 1fr); }
    }
  </style>
</head>
<body>

<!-- ══ BLOCK 1 · 整体数据概览 ══ -->
<div class="panel" id="overviewPanel">
  <div class="overview-header">
    <div class="section-title" style="margin-bottom:0">整体数据概览</div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-outline btn-sm" id="editOverviewBtn" onclick="toggleOverviewEdit()">编辑</button>
      <button class="btn btn-success btn-sm" id="saveOverviewBtn" style="display:none" onclick="saveOverview()">保存</button>
    </div>
  </div>
  <div class="cards-grid" id="cardsGrid"></div>
</div>

<!-- ══ BLOCK 2 · Tab 折线图 ══ -->
<div class="panel">
  <div class="tab-header">
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('posts',this)">帖子</button>
      <button class="tab-btn" onclick="switchTab('comments',this)">评论</button>
      <button class="tab-btn" onclick="switchTab('users',this)">用户信息审核</button>
    </div>
    <button class="btn btn-outline btn-sm" onclick="openEditModal()">✏ 编辑</button>
  </div>

  <!-- 帖子 -->
  <div class="tab-content active" id="tab-posts">
    <div class="axis-labels-row">
      <div class="axis-label-left">← 进审率（%）</div>
      <div class="axis-label-right">审出率（%） →</div>
    </div>
    <div class="chart-wrap"><canvas id="chartPosts"></canvas></div>
  </div>

  <!-- 评论 -->
  <div class="tab-content" id="tab-comments">
    <div class="axis-labels-row">
      <div class="axis-label-left">← 进审率（%）</div>
      <div class="axis-label-right">审出率（%） →</div>
    </div>
    <div class="chart-wrap"><canvas id="chartComments"></canvas></div>
  </div>

  <!-- 用户信息审核 -->
  <div class="tab-content" id="tab-users">
    <div class="axis-labels-row">
      <div class="axis-label-left">← 进审量级（条）</div>
      <div class="axis-label-right">审出率（%） →</div>
    </div>
    <div class="chart-wrap"><canvas id="chartUsers"></canvas></div>
  </div>
</div>

<!-- ══ EDIT MODAL ══ -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="modal-title" id="modalTitle">编辑数据</div>
    <div class="modal-hint">填写 1 月 ~ 6 月的数值，百分比请直接填数字（如 15 代表 15%）</div>
    <div id="modalFields"></div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeEditModal()">取消</button>
      <button class="btn btn-primary" onclick="applyEditModal()">确认</button>
    </div>
  </div>
</div>

<script>
const MONTHS = ['1月','2月','3月','4月','5月','6月'];

/* 预设颜色 */
const CARD_COLORS = [
  { key: 'blue',   bg: '#eff6ff', border: '#bfdbfe', value: '#2563eb' },
  { key: 'green',  bg: '#f0fdf4', border: '#bbf7d0', value: '#16a34a' },
  { key: 'orange', bg: '#fff7ed', border: '#fed7aa', value: '#ea580c' },
  { key: 'red',    bg: '#fff1f2', border: '#fecdd3', value: '#e11d48' },
  { key: 'purple', bg: '#faf5ff', border: '#e9d5ff', value: '#7c3aed' },
  { key: 'teal',   bg: '#f0fdfa', border: '#99f6e4', value: '#0d9488' },
  { key: 'gray',   bg: '#f8fafc', border: '#e2e8f0', value: '#475569' },
];

/* ── 概览卡片数据 ── */
let overviewCards = [
  { label: '帖子入审率（Q2末）',   value: '4.29',   unit: '%', trend: '↓ 显著下降', trendType: 'up',  color: 'blue'   },
  { label: '评论入审率（Q2末）',   value: '1.62',   unit: '%', trend: '↓ 显著下降', trendType: 'up',  color: 'blue'   },
  { label: '用信进审量降幅',        value: '83.37',  unit: '%', trend: '↓ AI介入后', trendType: 'up',  color: 'green'  },
  { label: '全场景审核准确率',      value: '≥99',    unit: '%', trend: '✓ 稳定保持', trendType: 'up',  color: 'green'  },
  { label: '国产模型覆盖率',        value: '95+',    unit: '%', trend: '↑ 6月底完成', trendType: 'up', color: 'orange' },
  { label: '二审闭环误伤降幅',      value: '71.2',   unit: '%', trend: '62.5%→18.2%', trendType: 'up', color: 'purple' },
];

/* ── 折线图数据
   posts:     进审率(%, 左轴 0-20) + 审出率(%, 右轴 0-40)
   comments: 进审率(%, 左轴 0-10) + 审出率(%, 右轴 0-25)
   users:    进审量级(条, 左轴 1000-15000) + 审出率(%, 右轴 0-5)
── */
let chartData = {
  posts: {
    title: '帖子',
    type: 'rate',
    leftMax: 25, rightMax: 45, leftMin: 0,
    series: [
      { label: '进审率', yAxis: 'left',  color: '#4f6ef7', data: [8.2,  10.5, 13.1, 11.8, 15.3, 17.6] },
      { label: '审出率', yAxis: 'right', color: '#ef5350', data: [18.4, 22.0, 28.5, 25.6, 33.2, 37.8] },
    ]
  },
  comments: {
    title: '评论',
    type: 'rate',
    leftMax: 12, rightMax: 28, leftMin: 0,
    series: [
      { label: '进审率', yAxis: 'left',  color: '#4f6ef7', data: [3.2,  4.5,  6.8,  5.9,  7.4,  9.1] },
      { label: '审出率', yAxis: 'right', color: '#ef5350', data: [8.5,  11.2, 15.6, 13.8, 18.4, 22.3] },
    ]
  },
  users: {
    title: '用户信息审核',
    type: 'mixed',
    leftMax: 15000, rightMax: 6, leftMin: 1000,
    series: [
      { label: '进审量级', yAxis: 'left',  color: '#4f6ef7', data: [1500, 3200, 6800, 5400, 9800, 13500] },
      { label: '审出率',   yAxis: 'right', color: '#ef5350', data: [1.2,  2.0,  3.1,  2.8,  4.0,  4.7]  },
    ]
  }
};

let charts = {};
let currentTab = 'posts';
let overviewEditing = false;

/* ════════════════════════
   OVERVIEW CARDS
════════════════════════ */
function renderCards() {
  const grid = document.getElementById('cardsGrid');
  grid.innerHTML = '';
  overviewCards.forEach((c, i) => {
    const colorKey = c.color || 'blue';
    const colorCfg = CARD_COLORS.find(x => x.key === colorKey) || CARD_COLORS[0];
    const colorDotsHtml = CARD_COLORS.map(col =>
      `<div class="card-color-dot${col.key === colorKey ? ' active' : ''}" style="background:${col.value};" title="${col.key}" onclick="setCardColor(${i},'${col.key}')"></div>`
    ).join('');
    const div = document.createElement('div');
    div.className = 'card' + (overviewEditing ? ' editing' : '');
    div.dataset.index = i;
    div.style.background = colorCfg.bg;
    div.style.borderColor = colorCfg.border;
    div.innerHTML = `
      <button class="card-remove-btn" title="删除" onclick="removeCard(${i})">×</button>
      <div class="card-label">
        <span class="card-label-text">${c.label}</span>
        <input class="card-label-input" value="${c.label}" placeholder="指标名称" />
      </div>
      <div class="card-value" style="color:${colorCfg.value}">${c.value}</div>
      <input class="card-edit-input" type="text" value="${c.value}" placeholder="数值" style="color:${colorCfg.value}" />
      <div class="card-unit">
        <span class="card-unit-text">${c.unit}</span>
        <input class="card-unit-input" value="${c.unit}" placeholder="单位" />
      </div>
      <span class="card-trend trend-${c.trendType}">${c.trend}</span>
      <input class="card-trend-input" value="${c.trend}" placeholder="趋势，如 ↑ 5%" />
      <div class="card-color-row">${colorDotsHtml}</div>
    `;
    grid.appendChild(div);
  });
  if (overviewEditing) {
    const addBtn = document.createElement('div');
    addBtn.className = 'card-add-btn';
    addBtn.title = '添加指标';
    addBtn.innerHTML = '+';
    addBtn.onclick = addCard;
    grid.appendChild(addBtn);
  }
}

function toggleOverviewEdit() {
  overviewEditing = true;
  document.getElementById('editOverviewBtn').style.display = 'none';
  document.getElementById('saveOverviewBtn').style.display = '';
  renderCards();
}

function setCardColor(i, colorKey) {
  overviewCards[i].color = colorKey;
  renderCards();
}

function saveOverview() {
  const cards = document.querySelectorAll('#cardsGrid .card');
  const savedColors = overviewCards.map(c => c.color);
  overviewCards = [];
  cards.forEach((card, idx) => {
    const trendVal = card.querySelector('.card-trend-input').value.trim();
    // read active color dot
    const activeDot = card.querySelector('.card-color-dot.active');
    const colorKey = activeDot ? activeDot.title : (savedColors[idx] || 'blue');
    overviewCards.push({
      label:     card.querySelector('.card-label-input').value.trim() || '指标',
      value:     card.querySelector('.card-edit-input').value.trim()  || '0',
      unit:      card.querySelector('.card-unit-input').value.trim(),
      trend:     trendVal,
      trendType: trendVal.startsWith('↓') ? 'down' : 'up',
      color:     colorKey
    });
  });
  overviewEditing = false;
  document.getElementById('editOverviewBtn').style.display = '';
  document.getElementById('saveOverviewBtn').style.display = 'none';
  renderCards();
}

function addCard() {
  overviewCards.push({ label: '新指标', value: '0', unit: '', trend: '↑ 0%', trendType: 'up', color: 'blue' });
  renderCards();
}
function removeCard(i) {
  overviewCards.splice(i, 1);
  renderCards();
}

/* ════════════════════════
   CHART BUILD
════════════════════════ */
function getScalesConfig(tabKey) {
  const d = chartData[tabKey];
  const isMixed = d.type === 'mixed';

  const leftLabel = isMixed ? '进审量级（条）' : '进审率（%）';
  const rightLabel = '审出率（%）';

  const leftMax  = d.leftMax;
  const rightMax = d.rightMax;
  const leftMin  = d.leftMin;
  const rightMin = 0;

  return {
    x: {
      grid: { color: '#f0f2f8' },
      ticks: { font: { size: 12 } }
    },
    yLeft: {
      type: 'linear',
      position: 'left',
      min: leftMin,
      max: leftMax,
      grid: { color: '#f0f2f8' },
      ticks: {
        font: { size: 11 },
        color: '#4f6ef7',
        callback: v => isMixed ? v.toLocaleString() : v + '%'
      },
      title: { display: false }
    },
    yRight: {
      type: 'linear',
      position: 'right',
      min: rightMin,
      max: rightMax,
      grid: { drawOnChartArea: false },
      ticks: {
        font: { size: 11 },
        color: '#ef5350',
        callback: v => v + '%'
      },
      title: { display: false }
    }
  };
}

// 四个阶段背景色块插件（每个 tab 通用）
const phaseBackgroundPlugin = {
  id: 'phaseBackground',
  beforeDraw(chart) {
    const { ctx, chartArea, scales } = chart;
    if (!chartArea) return;
    const { left, right, top, bottom } = chartArea;
    const xScale = scales.x;
    const totalWidth = right - left;
    // 6 个月等分，每格宽度
    const step = totalWidth / 5;

    // 阶段定义：[起始月index(0-based), 结束月index, 颜色, 标签]
    // P01: 1-2月 → index 0~1
    // P02: 3月初~4月初 → index 2~2.5
    // P03: 4月~5月初 → index 2.5~3.5
    // P04: 5月~6月 → index 4~5
    const phases = [
      { x1: 0,   x2: 1.5, color: 'rgba(79,110,247,0.10)',  label: 'P01 准备',   labelColor: '#4f6ef7' },
      { x1: 1.5, x2: 2.8, color: 'rgba(234,88,12,0.12)',  label: 'P02 扩张',   labelColor: '#c2410c' },
      { x1: 2.8, x2: 3.8, color: 'rgba(22,163,74,0.11)',  label: 'P03 全场景', labelColor: '#15803d' },
      { x1: 3.8, x2: 5,   color: 'rgba(234,179,8,0.13)',  label: 'P04 国产化', labelColor: '#a16207' },
    ];

    ctx.save();
    phases.forEach(p => {
      const px1 = left + p.x1 * step;
      const px2 = left + p.x2 * step;
      // 背景色
      ctx.fillStyle = p.color;
      ctx.fillRect(px1, top, px2 - px1, bottom - top);
      // 标签文字
      ctx.fillStyle = p.labelColor;
      ctx.font = '11px -apple-system, PingFang SC, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(p.label, (px1 + px2) / 2, top + 14);
    });
    ctx.restore();
  }
};

function buildChart(canvasId, tabKey) {
  const ctx = document.getElementById(canvasId).getContext('2d');
  const d = chartData[tabKey];
  if (charts[tabKey]) { charts[tabKey].destroy(); }

  charts[tabKey] = new Chart(ctx, {
    type: 'line',
    data: {
      labels: MONTHS,
      datasets: d.series.map(s => ({
        label: s.label,
        data: s.data,
        borderColor: s.color,
        backgroundColor: s.color + '18',
        borderWidth: 2.5,
        pointRadius: 4,
        pointHoverRadius: 6,
        tension: 0.35,
        fill: false,
        yAxisID: s.yAxis === 'left' ? 'yLeft' : 'yRight',
      }))
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          position: 'top',
          labels: { font: { size: 12 }, boxWidth: 12, padding: 16 }
        },
        tooltip: {
          mode: 'index',
          intersect: false,
          callbacks: {
            label: ctx => {
              const s = chartData[tabKey].series[ctx.datasetIndex];
              const isMixed = chartData[tabKey].type === 'mixed';
              const isLeft  = s.yAxis === 'left';
              const suffix  = (isMixed && isLeft) ? ' 条' : '%';
              return ` ${s.label}: ${ctx.parsed.y}${suffix}`;
            }
          }
        }
      },
      scales: getScalesConfig(tabKey),
      interaction: { mode: 'nearest', axis: 'x', intersect: false }
    },
    plugins: [phaseBackgroundPlugin]
  });
}

function initCharts() {
  buildChart('chartPosts',    'posts');
  buildChart('chartComments', 'comments');
  buildChart('chartUsers',    'users');
}

function switchTab(key, btn) {
  currentTab = key;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById('tab-' + key).classList.add('active');
}

/* ════════════════════════
   EDIT MODAL
════════════════════════ */
function openEditModal() {
  const d = chartData[currentTab];
  const isMixed = d.type === 'mixed';
  document.getElementById('modalTitle').textContent = `编辑「${d.title}」折线图数据`;
  document.getElementById('modalFields').innerHTML = '';

  d.series.forEach((s, si) => {
    const isLeft  = s.yAxis === 'left';
    const hint    = isMixed && isLeft ? '（单位：条）' : '（单位：%，直接填数字）';
    const heading = document.createElement('div');
    heading.className = 'modal-series-title';
    heading.innerHTML = `<span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${s.color}"></span>${s.label} <span style="font-size:11px;color:#aaa;font-weight:400">${hint}</span>`;
    document.getElementById('modalFields').appendChild(heading);

    const grid = document.createElement('div');
    grid.className = 'modal-months-grid';
    MONTHS.forEach((m, mi) => {
      const cell = document.createElement('div');
      cell.className = 'modal-month-cell';
      cell.innerHTML = `
        <label>${m}</label>
        <input type="number" id="inp_${si}_${mi}" value="${s.data[mi]}" step="0.1"
          onfocus="this.style.borderColor='#4f6ef7'" onblur="this.style.borderColor='#dde1f0'" />
      `;
      grid.appendChild(cell);
    });
    document.getElementById('modalFields').appendChild(grid);
  });

  document.getElementById('editModal').classList.add('open');
}

function closeEditModal() {
  document.getElementById('editModal').classList.remove('open');
}

function applyEditModal() {
  const d = chartData[currentTab];
  d.series.forEach((s, si) => {
    MONTHS.forEach((_, mi) => {
      const v = parseFloat(document.getElementById(`inp_${si}_${mi}`).value);
      s.data[mi] = isNaN(v) ? 0 : v;
    });
  });
  const canvasMap = { posts: 'chartPosts', comments: 'chartComments', users: 'chartUsers' };
  buildChart(canvasMap[currentTab], currentTab);
  closeEditModal();
}

document.getElementById('editModal').addEventListener('click', function(e) {
  if (e.target === this) closeEditModal();
});

/* ════════════════════════
   INIT
════════════════════════ */
renderCards();
initCharts();
</script>
</body>
</html>
