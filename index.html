<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>数据看板</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Arial, sans-serif;
      background: #f5f6fa;
      color: #1a1a2e;
      min-height: 100vh;
      padding: 20px;
    }

    /* ─── Section Title ─── */
    .section-title {
      font-size: 15px;
      font-weight: 600;
      color: #444;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-title::before {
      content: '';
      display: inline-block;
      width: 4px;
      height: 16px;
      background: #4f6ef7;
      border-radius: 2px;
    }

    /* ─── Panel ─── */
    .panel {
      background: #fff;
      border-radius: 12px;
      padding: 20px 24px;
      box-shadow: 0 1px 6px rgba(0,0,0,.07);
      margin-bottom: 16px;
    }

    /* ─── Block 1: Overview Cards ─── */
    .overview-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px;
    }
    .card {
      background: #f8f9ff;
      border: 1px solid #e8eaf6;
      border-radius: 10px;
      padding: 14px 16px;
      position: relative;
      transition: box-shadow .2s;
    }
    .card:hover { box-shadow: 0 2px 10px rgba(79,110,247,.12); }
    .card-label {
      font-size: 12px;
      color: #888;
      margin-bottom: 6px;
    }
    .card-value {
      font-size: 22px;
      font-weight: 700;
      color: #2c3e7a;
      line-height: 1.2;
    }
    .card-unit {
      font-size: 12px;
      color: #aaa;
      margin-top: 2px;
    }
    .card-trend {
      font-size: 11px;
      margin-top: 6px;
      padding: 2px 6px;
      border-radius: 20px;
      display: inline-block;
    }
    .trend-up   { background: #e8f5e9; color: #388e3c; }
    .trend-down { background: #fce4ec; color: #c62828; }

    /* Edit mode for cards */
    .card.editing .card-value { display: none; }
    .card.editing .card-edit-input { display: block; }
    .card-edit-input {
      display: none;
      width: 100%;
      font-size: 20px;
      font-weight: 700;
      color: #2c3e7a;
      border: none;
      border-bottom: 2px solid #4f6ef7;
      background: transparent;
      outline: none;
      padding: 2px 0;
    }
    .card.editing .card-label-input { display: block; }
    .card.editing .card-label-text { display: none; }
    .card-label-input {
      display: none;
      width: 100%;
      font-size: 12px;
      color: #888;
      border: none;
      border-bottom: 1px dashed #ccc;
      background: transparent;
      outline: none;
      padding: 1px 0;
      margin-bottom: 4px;
    }
    .card.editing .card-unit-input { display: block; }
    .card.editing .card-unit-text { display: none; }
    .card-unit-input {
      display: none;
      width: 100%;
      font-size: 12px;
      color: #aaa;
      border: none;
      border-bottom: 1px dashed #ccc;
      background: transparent;
      outline: none;
      padding: 1px 0;
    }
    .card.editing .card-trend { display: none; }
    .card.editing .card-trend-input { display: block; }
    .card-trend-input {
      display: none;
      width: 100%;
      font-size: 11px;
      border: none;
      border-bottom: 1px dashed #ccc;
      background: transparent;
      outline: none;
      padding: 1px 0;
      margin-top: 4px;
      color: #555;
    }

    /* Add/Remove card buttons */
    .card-add-btn {
      background: #f0f3ff;
      border: 2px dashed #c5cef7;
      border-radius: 10px;
      padding: 14px 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #7a8fd4;
      font-size: 24px;
      transition: background .2s;
      min-height: 90px;
    }
    .card-add-btn:hover { background: #e4e9ff; }
    .card-remove-btn {
      position: absolute;
      top: 6px;
      right: 6px;
      width: 18px;
      height: 18px;
      background: #ff5252;
      color: #fff;
      border: none;
      border-radius: 50%;
      font-size: 12px;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }
    .card.editing .card-remove-btn { display: flex; }

    /* ─── Buttons ─── */
    .btn {
      padding: 6px 16px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      border: none;
      font-weight: 500;
      transition: opacity .2s;
    }
    .btn:hover { opacity: .85; }
    .btn-primary { background: #4f6ef7; color: #fff; }
    .btn-outline { background: #fff; color: #4f6ef7; border: 1px solid #4f6ef7; }
    .btn-success { background: #43a047; color: #fff; }
    .btn-sm { padding: 4px 12px; font-size: 12px; }

    /* ─── Block 2: Tab Chart ─── */
    .tab-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .tabs {
      display: flex;
      gap: 4px;
      background: #f0f2f8;
      border-radius: 8px;
      padding: 4px;
    }
    .tab-btn {
      padding: 6px 16px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      border: none;
      background: transparent;
      color: #666;
      font-weight: 500;
      transition: all .2s;
    }
    .tab-btn.active {
      background: #fff;
      color: #4f6ef7;
      box-shadow: 0 1px 4px rgba(0,0,0,.1);
    }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .chart-wrap {
      position: relative;
      height: 260px;
    }

    /* ─── Edit Modal ─── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.4);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #fff;
      border-radius: 14px;
      padding: 28px 32px;
      width: 480px;
      max-width: 95vw;
      box-shadow: 0 8px 40px rgba(0,0,0,.18);
    }
    .modal-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 20px;
      color: #222;
    }
    .modal-row {
      display: flex;
      align-items: center;
      margin-bottom: 12px;
      gap: 10px;
    }
    .modal-row label {
      width: 48px;
      font-size: 13px;
      color: #555;
      flex-shrink: 0;
    }
    .modal-row input {
      flex: 1;
      padding: 7px 10px;
      border: 1px solid #dde1f0;
      border-radius: 6px;
      font-size: 13px;
      outline: none;
      transition: border-color .2s;
    }
    .modal-row input:focus { border-color: #4f6ef7; }
    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 20px;
    }
    .modal-hint {
      font-size: 12px;
      color: #aaa;
      margin-bottom: 16px;
    }

    /* ─── Responsive ─── */
    @media (max-width: 480px) {
      body { padding: 12px; }
      .cards-grid { grid-template-columns: repeat(2, 1fr); }
      .modal { padding: 20px 16px; }
    }
  </style>
</head>
<body>

<!-- ══════════════════════════════════════
     BLOCK 1 · 整体数据展示
══════════════════════════════════════ -->
<div class="panel" id="overviewPanel">
  <div class="overview-header">
    <div class="section-title" style="margin-bottom:0">整体数据概览</div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-outline btn-sm" id="editOverviewBtn" onclick="toggleOverviewEdit()">编辑</button>
      <button class="btn btn-success btn-sm" id="saveOverviewBtn" style="display:none" onclick="saveOverview()">保存</button>
    </div>
  </div>

  <div class="cards-grid" id="cardsGrid">
    <!-- Cards injected by JS -->
  </div>
</div>

<!-- ══════════════════════════════════════
     BLOCK 2 · Tab 折线图
══════════════════════════════════════ -->
<div class="panel">
  <div class="tab-header">
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('posts',this)">帖子</button>
      <button class="tab-btn" onclick="switchTab('comments',this)">评论</button>
      <button class="tab-btn" onclick="switchTab('users',this)">用户信息审核</button>
    </div>
    <button class="btn btn-outline btn-sm" onclick="openEditModal()">✏ 编辑</button>
  </div>

  <div class="tab-content active" id="tab-posts">
    <div class="chart-wrap"><canvas id="chartPosts"></canvas></div>
  </div>
  <div class="tab-content" id="tab-comments">
    <div class="chart-wrap"><canvas id="chartComments"></canvas></div>
  </div>
  <div class="tab-content" id="tab-users">
    <div class="chart-wrap"><canvas id="chartUsers"></canvas></div>
  </div>
</div>

<!-- ══════════════════════════════════════
     EDIT MODAL · 折线图数据编辑
══════════════════════════════════════ -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="modal-title" id="modalTitle">编辑数据</div>
    <div class="modal-hint">请填写 1 月 ~ 6 月的数据值（每月一个数字）</div>
    <div id="modalFields"></div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeEditModal()">取消</button>
      <button class="btn btn-primary" onclick="applyEditModal()">确认</button>
    </div>
  </div>
</div>

<script>
/* ══════════════════════════════════════
   STATE
══════════════════════════════════════ */
const MONTHS = ['1月','2月','3月','4月','5月','6月'];

// Overview cards data
let overviewCards = [
  { label: '累计帖子数',   value: '128,450', unit: '篇',  trend: '↑ 12.3%', trendType: 'up' },
  { label: '累计评论数',   value: '3,204,800', unit: '条', trend: '↑ 8.7%',  trendType: 'up' },
  { label: '注册用户数',   value: '56,320',  unit: '人',  trend: '↑ 5.1%',  trendType: 'up' },
  { label: '待审核帖子',   value: '1,240',   unit: '篇',  trend: '↓ 3.2%',  trendType: 'down' },
  { label: '审核通过率',   value: '94.6',    unit: '%',   trend: '↑ 1.2%',  trendType: 'up' },
  { label: '日活用户',     value: '8,930',   unit: '人',  trend: '↑ 6.8%',  trendType: 'up' },
];

// Chart datasets
let chartData = {
  posts: {
    title: '帖子',
    series: [
      { label: '发帖量',   color: '#4f6ef7', data: [8200, 9500, 11200, 10800, 13400, 15600] },
      { label: '审核通过', color: '#43a047', data: [7800, 9000, 10600, 10200, 12700, 14800] },
      { label: '审核拒绝', color: '#ef5350', data: [400,  500,  600,   600,   700,   800]   },
    ]
  },
  comments: {
    title: '评论',
    series: [
      { label: '新增评论', color: '#4f6ef7', data: [42000, 48000, 55000, 52000, 61000, 73000] },
      { label: '违规评论', color: '#ef5350', data: [1200,  1400,  1600,  1500,  1800,  2100]  },
    ]
  },
  users: {
    title: '用户信息审核',
    series: [
      { label: '提交审核', color: '#4f6ef7', data: [3200, 3800, 4500, 4200, 5100, 6000] },
      { label: '审核通过', color: '#43a047', data: [3000, 3600, 4300, 4000, 4900, 5700] },
      { label: '审核拒绝', color: '#ef5350', data: [200,  200,  200,  200,  200,  300]  },
    ]
  }
};

let charts = {};
let currentTab = 'posts';
let overviewEditing = false;

/* ══════════════════════════════════════
   OVERVIEW CARDS
══════════════════════════════════════ */
function renderCards() {
  const grid = document.getElementById('cardsGrid');
  grid.innerHTML = '';
  overviewCards.forEach((c, i) => {
    const div = document.createElement('div');
    div.className = 'card' + (overviewEditing ? ' editing' : '');
    div.dataset.index = i;
    div.innerHTML = `
      <button class="card-remove-btn" title="删除" onclick="removeCard(${i})">×</button>
      <div class="card-label">
        <span class="card-label-text">${c.label}</span>
        <input class="card-label-input" value="${c.label}" placeholder="指标名称" />
      </div>
      <div class="card-value">${c.value}</div>
      <input class="card-edit-input" type="text" value="${c.value}" placeholder="数值" />
      <div class="card-unit">
        <span class="card-unit-text">${c.unit}</span>
        <input class="card-unit-input" value="${c.unit}" placeholder="单位" />
      </div>
      <span class="card-trend trend-${c.trendType}">${c.trend}</span>
      <input class="card-trend-input" value="${c.trend}" placeholder="趋势文字，如 ↑ 5%" />
    `;
    grid.appendChild(div);
  });

  if (overviewEditing) {
    const addBtn = document.createElement('div');
    addBtn.className = 'card-add-btn';
    addBtn.title = '添加指标';
    addBtn.innerHTML = '+';
    addBtn.onclick = addCard;
    grid.appendChild(addBtn);
  }
}

function toggleOverviewEdit() {
  overviewEditing = true;
  document.getElementById('editOverviewBtn').style.display = 'none';
  document.getElementById('saveOverviewBtn').style.display = '';
  renderCards();
}

function saveOverview() {
  const cards = document.querySelectorAll('#cardsGrid .card');
  overviewCards = [];
  cards.forEach(card => {
    const labelInput = card.querySelector('.card-label-input');
    const valueInput = card.querySelector('.card-edit-input');
    const unitInput  = card.querySelector('.card-unit-input');
    const trendInput = card.querySelector('.card-trend-input');
    const trendVal   = trendInput.value.trim();
    const trendType  = trendVal.startsWith('↓') ? 'down' : 'up';
    overviewCards.push({
      label: labelInput.value.trim() || '指标',
      value: valueInput.value.trim() || '0',
      unit:  unitInput.value.trim(),
      trend: trendVal,
      trendType
    });
  });
  overviewEditing = false;
  document.getElementById('editOverviewBtn').style.display = '';
  document.getElementById('saveOverviewBtn').style.display = 'none';
  renderCards();
}

function addCard() {
  overviewCards.push({ label: '新指标', value: '0', unit: '', trend: '↑ 0%', trendType: 'up' });
  renderCards();
}

function removeCard(i) {
  overviewCards.splice(i, 1);
  renderCards();
}

/* ══════════════════════════════════════
   CHART
══════════════════════════════════════ */
function buildChart(canvasId, tabKey) {
  const ctx = document.getElementById(canvasId).getContext('2d');
  const data = chartData[tabKey];
  if (charts[tabKey]) { charts[tabKey].destroy(); }
  charts[tabKey] = new Chart(ctx, {
    type: 'line',
    data: {
      labels: MONTHS,
      datasets: data.series.map(s => ({
        label: s.label,
        data: s.data,
        borderColor: s.color,
        backgroundColor: s.color + '18',
        borderWidth: 2.5,
        pointRadius: 4,
        pointHoverRadius: 6,
        tension: 0.35,
        fill: false,
      }))
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          position: 'top',
          labels: { font: { size: 12 }, boxWidth: 12, padding: 16 }
        },
        tooltip: { mode: 'index', intersect: false }
      },
      scales: {
        x: {
          grid: { color: '#f0f2f8' },
          ticks: { font: { size: 12 } }
        },
        y: {
          grid: { color: '#f0f2f8' },
          ticks: { font: { size: 12 } },
          beginAtZero: false
        }
      },
      interaction: { mode: 'nearest', axis: 'x', intersect: false }
    }
  });
}

function initCharts() {
  buildChart('chartPosts',    'posts');
  buildChart('chartComments', 'comments');
  buildChart('chartUsers',    'users');
}

function switchTab(key, btn) {
  currentTab = key;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById('tab-' + key).classList.add('active');
}

/* ══════════════════════════════════════
   EDIT MODAL
══════════════════════════════════════ */
function openEditModal() {
  const data = chartData[currentTab];
  document.getElementById('modalTitle').textContent = `编辑「${data.title}」折线图数据`;
  const fields = document.getElementById('modalFields');
  fields.innerHTML = '';

  data.series.forEach((s, si) => {
    const heading = document.createElement('div');
    heading.style.cssText = 'font-size:13px;font-weight:600;color:#333;margin:14px 0 8px;display:flex;align-items:center;gap:8px';
    heading.innerHTML = `<span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${s.color}"></span>${s.label}`;
    fields.appendChild(heading);

    const row = document.createElement('div');
    row.style.cssText = 'display:grid;grid-template-columns:repeat(6,1fr);gap:8px';
    MONTHS.forEach((m, mi) => {
      const wrap = document.createElement('div');
      wrap.style.cssText = 'display:flex;flex-direction:column;gap:3px';
      wrap.innerHTML = `
        <label style="font-size:11px;color:#aaa;text-align:center">${m}</label>
        <input type="number" id="inp_${si}_${mi}" value="${s.data[mi]}"
          style="padding:6px 4px;border:1px solid #dde1f0;border-radius:6px;font-size:13px;text-align:center;outline:none;width:100%"
          onfocus="this.style.borderColor='#4f6ef7'" onblur="this.style.borderColor='#dde1f0'" />
      `;
      row.appendChild(wrap);
    });
    fields.appendChild(row);
  });

  document.getElementById('editModal').classList.add('open');
}

function closeEditModal() {
  document.getElementById('editModal').classList.remove('open');
}

function applyEditModal() {
  const data = chartData[currentTab];
  data.series.forEach((s, si) => {
    MONTHS.forEach((_, mi) => {
      const val = parseFloat(document.getElementById(`inp_${si}_${mi}`).value);
      s.data[mi] = isNaN(val) ? 0 : val;
    });
  });
  const canvasMap = { posts: 'chartPosts', comments: 'chartComments', users: 'chartUsers' };
  buildChart(canvasMap[currentTab], currentTab);
  closeEditModal();
}

// Close modal on overlay click
document.getElementById('editModal').addEventListener('click', function(e) {
  if (e.target === this) closeEditModal();
});

/* ══════════════════════════════════════
   INIT
══════════════════════════════════════ */
renderCards();
initCharts();
</script>
</body>
</html>
